name: 生态流量报告
description: 小型水库生态流量核定与保障实施方案

# 章节识别：一级标题（# 1 xxx 或 "第X章"）
chapter_pattern: "^#\\s+\\d+|^第[一二三四五六七八九十]+章"

dimensions:
  completeness:
    name: 完整性
    description: 章节不留空、句子不截断、逻辑链完整
    rules:
      - 每个章节标题下必须有完整的正文内容，不能只有标题或半句话
      - 句子必须语法完整、有主谓宾，不能截断（如"景宁小型水库生态流量核定与保障分析对象"无结尾）
      - 编号列表每一条都必须有完整内容，不能只写序号
      - 筛选链必须完整展现：总数→已完成数→剩余数→排除数→最终核定数，每一步都要交代
      - 空白标题（如只有 #### 没有内容）必须标出

  structure:
    name: 结构性
    description: 先介绍后方案、数据有分析、论证有逻辑
    rules:
      - 4.1 泄放设施章节必须先写每座水库的现场查勘情况（位置、集雨面积、管理单位、现有设施），再提改造建议
      - 时间序列数据（如用水量变化）必须有趋势分析文字，不能只列表格
      - 报告是"有组织的论证"不是"信息罗列"，每节应有起承转合
      - 计算方法章节应先说明方法原理，再给出计算过程和结果
      - 保障措施章节应按"现状→问题→方案→预期效果"的逻辑展开

  tone:
    name: 立场措辞
    description: 乙方立场、委婉用词、避免禁用词
    rules:
      - 用"建议""按要求确定"，不用"必须""不再列入"等定论式表述
      - 用"缺乏在线监测手段"而非"监管盲区"，"难以有效监测"而非"无法监测"
      - 禁用词列表：确保、我们、我司、贵司、必须（用于指令语境时）
      - 不能出现口语化表达或非正式用语
      - 引用政策文件时应注明文号，不能笼统说"根据有关规定"

  consistency:
    name: 数据一致性
    description: 表格数字与正文描述匹配、单位正确
    rules:
      - 表格中的水库数量、面积、流量等数字必须与正文描述一致
      - 单位必须统一，不混用（m³/s 不混用"立方米每秒"，km² 不混用"平方公里"）
      - 前后章节引用同一数据时数值必须一致（如水库总数、核定数量）
      - 生态流量计算结果（Tennant法、Qp法）与推荐成果表必须匹配
      - 投资估算的分项合计必须等于总计
