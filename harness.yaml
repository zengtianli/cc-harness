    skills: [zdys, resources, plan-first, structure]
  water-src:
    path: ~/Dev/Work/water-src
    skills: [water-src, resources, plan-first, structure]
  capacity:
    path: ~/Dev/Work/capacity
    skills: [capacity, resources, plan-first]
  bids:
    path: ~/Dev/Work/bids
    skills: [bid, resources, plan-first]
  reclaim:
    path: ~/Dev/Work/reclaim
    skills: [capacity, resources, plan-first, structure]
  international-assets:
